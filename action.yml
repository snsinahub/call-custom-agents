name: "Copilot Custom Agent"
description: "Runs a Copilot custom agent via the Copilot SDK"
author: "snsinahub"

inputs:
  prompt:
    description: "The prompt to send to the agent"
    required: true
  agent:
    description: "The custom agent name (must match the .agent.md filename without extension)"
    required: true
    default: "repo-analyzer-mcp"
  token:
    description: "GitHub PAT with Copilot Requests permission"
    required: true
  model:
    description: "AI model to use"
    required: false
    default: "gpt-4.1"

outputs:
  response:
    description: "The agent response content"

runs:
  using: "node24"          # matches node-version in the workflow
  main: "dist/index.mjs"