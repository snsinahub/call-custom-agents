name: 'Call Custom Agents'
description: 'Run a named GitHub Copilot SDK custom agent with a prompt'
author: 'snsina-org'

inputs:
  agent-name:
    description: 'Name of the custom agent to run (researcher, editor, security-auditor)'
    required: true
  prompt:
    description: 'The prompt to send to the agent'
    required: true
  model:
    description: 'The model to use for the agent'
    required: false
    default: 'gpt-4.1'
  github-token:
    description: 'GitHub token for authentication. When provided, takes priority over other authentication methods.'
    required: false

outputs:
  response:
    description: 'The response returned by the agent'

runs:
  using: 'composite'
  steps:
    - name: Run agent
      run: node ${{ github.action_path }}/dist/index.mjs
      shell: bash
      env:
        INPUT_AGENT-NAME: ${{ inputs.agent-name }}
        INPUT_PROMPT: ${{ inputs.prompt }}
        INPUT_MODEL: ${{ inputs.model }}
        INPUT_GITHUB-TOKEN: ${{ inputs.github-token }}
