name: "Copilot Custom Agent"
description: "Runs a Copilot custom agent via the Copilot SDK"
author: "snsinahub"

inputs:
  prompt:
    description: "The prompt to send to the agent"
    required: true
  agent:
    description: "The custom agent name (must match the .agent.md filename without extension)"
    required: true
    default: "repo-analyzer-mcp"
  token:
    description: "GitHub PAT with Copilot Requests permission"
    required: true
  model:
    description: "AI model to use"
    required: false
    default: "gpt-4.1"
  timeout:
    description: "Timeout in milliseconds to wait for agent completion"
    required: false
    default: "600000"

outputs:
  response:
    description: "The agent response content"

runs:
  using: "composite"
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "24"

    - name: Install dependencies
      shell: bash
      working-directory: ${{ github.action_path }}
      run: npm ci

    - name: Run agent
      shell: bash
      working-directory: ${{ github.action_path }}
      env:
        INPUT_PROMPT: ${{ inputs.prompt }}
        INPUT_AGENT: ${{ inputs.agent }}
        INPUT_TOKEN: ${{ inputs.token }}
        INPUT_MODEL: ${{ inputs.model }}
        INPUT_TIMEOUT: ${{ inputs.timeout }}
      run: node src/run-agent.mjs