# Run the repo analyzer on a weekly schedule
name: Scheduled Repository Analysis

on:
  schedule:
    # Every Monday at 08:00 UTC
    - cron: "0 8 * * 1"
  workflow_dispatch: # Allow manual trigger

jobs:
  weekly-analysis:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Run weekly analysis
        id: analyze
        uses: snsinahub/call-custom-agents@v1.0.0
        with:
          agent: repo-analyzer-mcp
          prompt: |
            Perform a full repository analysis. Complete ALL steps before responding:
            1. Map the repository structure
            2. Analyze dependencies for outdated or vulnerable packages
            3. Identify code patterns and potential improvements
            4. Write findings to reports/repo-analysis.md
            5. Create GitHub issues for each new finding
            6. Respond with a summary of everything you did
          token: ${{ secrets.COPILOT_TOKEN }}
          model: claude-sonnet-4.6
          timeout: "600000"
          create-pr: "true"
          pr-title: "chore: weekly repo analysis"
          pr-branch: "copilot-agent/weekly-analysis"

      - name: Upload analysis report
        uses: actions/upload-artifact@v4
        with:
          name: repo-analysis
          path: reports/
          if-no-files-found: ignore

      - name: Summary
        run: |
          echo "### Weekly Analysis" >> "$GITHUB_STEP_SUMMARY"
          echo "- Files changed: ${{ steps.analyze.outputs.files-changed }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- PR: ${{ steps.analyze.outputs.pr-url }}" >> "$GITHUB_STEP_SUMMARY"
